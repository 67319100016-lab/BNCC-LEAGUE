<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eFootball BNCC LEAGUE</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-dark: #0b1120;
            --card-bg: #1e293b; 
            --primary: #38bdf8;
            --accent: #f43f5e; 
            --text-main: #f8fafc; 
            --text-dim: #94a3b8;
            --gold: #fbbf24; 
            --win: #10b981; 
            --draw: #64748b; 
            --loss: #ef4444;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            background: var(--bg-dark); 
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0b1120 100%);
            color: var(--text-main); 
            padding: 20px; 
            margin: 0; 
        }

        .container { max-width: 850px; margin: 0 auto; }

        #capture-area { padding: 25px; background: rgba(11, 17, 32, 0.8); border-radius: 16px; backdrop-filter: blur(5px); }

        h2 { 
            text-align: center; 
            color: var(--primary); 
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.6);
            margin-bottom: 30px; 
            font-size: 2rem;
        }

        .table-container { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 5px; 
            box-shadow: var(--shadow); 
            margin-bottom: 30px; 
            border: 1px solid rgba(56, 189, 248, 0.1);
        }

        table { width: 100%; border-collapse: collapse; }
        th { color: var(--text-dim); font-size: 0.75rem; padding: 18px 12px; text-transform: uppercase; border-bottom: 2px solid rgba(51, 65, 85, 0.5); }
        td { padding: 16px 12px; text-align: center; border-bottom: 1px solid rgba(51, 65, 85, 0.3); }

        .match-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            margin-bottom: 15px; 
            padding: 20px; 
            display: grid; 
            grid-template-columns: 1fr 140px 1fr; 
            align-items: center; 
            border: 1px solid rgba(51, 65, 85, 0.3);
            transition: 0.3s;
        }

        .match-card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: var(--primary); }
        
        .score-box { display: flex; justify-content: center; gap: 8px; align-items: center; }

        input[type="number"] { 
            width: 48px; height: 45px; background: #0f172a; border: 2px solid #334155; 
            border-radius: 10px; color: white; text-align: center; font-size: 1.3rem; font-weight: bold; 
        }

        input:disabled { opacity: 0.8; border-color: var(--primary); color: var(--primary); background: rgba(56, 189, 248, 0.05); }

        .btn-lock { 
            background: none; border: 1px solid var(--text-dim); color: var(--text-dim); 
            border-radius: 8px; padding: 4px 12px; font-size: 0.75rem; cursor: pointer; margin-top: 8px; 
        }

        .btn-lock.active { border-color: var(--win); color: var(--win); background: rgba(16, 185, 129, 0.1); }

        .btn-group { display: flex; justify-content: center; gap: 15px; margin-top: 30px; }
        
        .btn { 
            border: none; padding: 14px 28px; border-radius: 10px; cursor: pointer; 
            font-family: 'Kanit'; font-weight: bold; transition: 0.3s; 
        }

        .btn-share { background: linear-gradient(135deg, var(--primary) 0%, #0ea5e9 100%); color: var(--bg-dark); }
        .btn-reset { background: linear-gradient(135deg, var(--accent) 0%, #e11d48 100%); color: white; }

        .pts-badge { background: var(--primary); color: var(--bg-dark); padding: 3px 10px; border-radius: 6px; font-weight: bold; }

        .form-dot { 
            display: inline-flex; align-items: center; justify-content: center;
            width: 20px; height: 20px; border-radius: 6px; margin: 0 2px; 
            font-size: 0.7rem; font-weight: bold; color: var(--bg-dark);
        }
        .dot-w { background: var(--win); } 
        .dot-d { background: var(--draw); } 
        .dot-l { background: var(--loss); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="capture-area">
        <h2>🏆 eFootball BNCC LEAGUE</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>#</th><th style="text-align:left">Team</th>
                        <th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>PTS</th>
                        <th>FORM</th>
                    </tr>
                </thead>
                <tbody id="standings-body"></tbody>
            </table>
        </div>
    </div>
    <div id="match-list"></div>
    <div class="btn-group">
        <button class="btn btn-share" onclick="shareAsImage()">📸 บันทึกเป็นรูปภาพ</button>
        <button class="btn btn-reset" onclick="resetScores()">ล้างข้อมูล</button>
    </div>
</div>

<script>
    const teamNames = ["ทีม ไอซ์", "ทีม ภู", "ทีม น็อต", "ทีม เจ๋ง", "ทีม อ้น"];
    let matches = [];
    let lockedMatches = {};

    function generateFixtures(teams) {
        let tempTeams = [...teams];
        if (tempTeams.length % 2 !== 0) tempTeams.push(null);
        let fixtureList = [];
        let rounds = tempTeams.length - 1;
        for (let r = 0; r < rounds; r++) {
            for (let i = 0; i < tempTeams.length / 2; i++) {
                const home = tempTeams[i];
                const away = tempTeams[tempTeams.length - 1 - i];
                if (home && away) fixtureList.push({ home, away });
            }
            tempTeams.splice(1, 0, tempTeams.pop());
        }
        return fixtureList;
    }

    matches = generateFixtures(teamNames);

    function updateData() {
        let stats = teamNames.map(name => ({
            name, played: 0, win: 0, draw: 0, loss: 0, gf: 0, ga: 0, gd: 0, pts: 0, form: []
        }));
        let saveData = {};
        let h2hData = {};

        matches.forEach((match, i) => {
            const hInp = document.getElementById(`h-${i}`);
            const aInp = document.getElementById(`a-${i}`);
            if (hInp && aInp && hInp.value !== "" && aInp.value !== "") {
                const hs = parseInt(hInp.value); const as = parseInt(aInp.value);
                saveData[i] = { h: hs, a: as };
                const home = stats.find(t => t.name === match.home);
                const away = stats.find(t => t.name === match.away);
                
                home.played++; away.played++;
                home.gf += hs; home.ga += as;
                away.gf += as; away.ga += hs;

                const key = [match.home, match.away].sort().join('_vs_');
                h2hData[key] = { [match.home]: hs, [match.away]: as };

                if (hs > as) { home.win++; home.pts += 3; away.loss++; home.form.push('w'); away.form.push('l'); }
                else if (hs < as) { away.win++; away.pts += 3; home.loss++; away.form.push('w'); home.form.push('l'); }
                else { home.draw++; away.draw++; home.pts += 1; away.pts += 1; home.form.push('d'); away.form.push('d'); }
                home.gd = home.gf - home.ga; away.gd = away.gf - away.ga;
            }
        });

        localStorage.setItem('pes_scores_v4', JSON.stringify(saveData));
        localStorage.setItem('pes_locks_v4', JSON.stringify(lockedMatches));

        stats.sort((a, b) => {
            if (b.pts !== a.pts) return b.pts - a.pts;
            if (b.gd !== a.gd) return b.gd - a.gd;
            const key = [a.name, b.name].sort().join('_vs_');
            if (h2hData[key]) return h2hData[key][b.name] - h2hData[key][a.name];
            return 0;
        });

        renderStandings(stats);
        checkTournamentComplete(stats);
    }

    function toggleLock(i) {
        lockedMatches[i] = !lockedMatches[i];
        const hInp = document.getElementById(`h-${i}`);
        const aInp = document.getElementById(`a-${i}`);
        const btn = document.getElementById(`lock-btn-${i}`);
        
        if (lockedMatches[i]) {
            hInp.disabled = true; aInp.disabled = true;
            btn.innerText = "🔓 UNLOCK"; btn.classList.add('active');
            if (hInp.value !== aInp.value) confetti({ particleCount: 40, spread: 50, origin: { y: 0.7 } });
        } else {
            hInp.disabled = false; aInp.disabled = false;
            btn.innerText = "🔒 LOCK FT"; btn.classList.remove('active');
        }
        updateData();
    }

    function checkTournamentComplete(stats) {
        const completed = Object.keys(lockedMatches).filter(k => lockedMatches[k]).length;
        if (completed === matches.length && matches.length > 0) {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    }

    function renderStandings(stats) {
        document.getElementById("standings-body").innerHTML = stats.map((team, i) => `
            <tr style="${i === 0 ? 'background: rgba(251, 191, 36, 0.05);' : ''}">
                <td>${i + 1}</td>
                <td style="text-align:left; font-weight:bold; color:${i === 0 ? 'var(--gold)' : 'inherit'}">${team.name} ${i === 0 ? '🏆' : ''}</td>
                <td>${team.played}</td><td>${team.win}</td><td>${team.draw}</td><td>${team.loss}</td>
                <td style="color:${team.gd >= 0 ? 'var(--win)' : 'var(--loss)'}">${team.gd > 0 ? '+' + team.gd : team.gd}</td>
                <td><span class="pts-badge">${team.pts}</span></td>
                <td>${team.form.slice(-3).map(res => `<span class="form-dot dot-${res}">${res.toUpperCase()}</span>`).join('')}</td>
            </tr>
        `).join('');
    }

    function renderMatches() {
        document.getElementById("match-list").innerHTML = matches.map((match, i) => `
            <div class="match-card">
                <div style="text-align:right; font-weight:500;">${match.home}</div>
                <div style="text-align:center">
                    <div class="score-box">
                        <input type="number" id="h-${i}" oninput="updateData()" placeholder="-">
                        <span>:</span>
                        <input type="number" id="a-${i}" oninput="updateData()" placeholder="-">
                    </div>
                    <button id="lock-btn-${i}" class="btn-lock" onclick="toggleLock(${i})">🔒 LOCK FT</button>
                </div>
                <div style="text-align:left; font-weight:500;">${match.away}</div>
            </div>
        `).join('');
    }

    function shareAsImage() {
        html2canvas(document.getElementById("capture-area"), { backgroundColor: "#0b1120" }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'EFB-Pro-Standings.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    function resetScores() {
        if (confirm("ล้างข้อมูลทั้งหมด?")) { localStorage.clear(); location.reload(); }
    }

    renderMatches();
    const sScores = localStorage.getItem('pes_scores_v4');
    const sLocks = localStorage.getItem('pes_locks_v4');
    if (sScores) {
        const scores = JSON.parse(sScores);
        lockedMatches = sLocks ? JSON.parse(sLocks) : {};
        matches.forEach((_, i) => {
            if (scores[i]) {
                document.getElementById(`h-${i}`).value = scores[i].h;
                document.getElementById(`a-${i}`).value = scores[i].a;
                if (lockedMatches[i]) toggleLock(i);
            }
        });
    }
    updateData();
</script>
</body>
</html>
