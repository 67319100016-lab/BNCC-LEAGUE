<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BNCC LEAGUE - Mobile Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-dark: #0b1120;
            --card-bg: #1e293b; 
            --primary: #38bdf8;
            --accent: #f43f5e; 
            --text-main: #f8fafc; 
            --text-dim: #94a3b8;
            --gold: #fbbf24; 
            --win: #10b981; 
            --draw: #64748b; 
            --loss: #ef4444;
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            background: var(--bg-dark); 
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0b1120 100%);
            color: var(--text-main); 
            padding: 10px;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container { max-width: 600px; margin: 0 auto; }

        #capture-area { padding: 12px; background: rgba(11, 17, 32, 0.8); border-radius: 12px; backdrop-filter: blur(5px); }

        h2 { 
            text-align: center; 
            color: var(--primary); 
            margin: 15px 0; 
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Responsive Table */
        .table-container { 
            background: var(--card-bg); 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            margin-bottom: 25px; 
            border: 1px solid rgba(56, 189, 248, 0.1);
            overflow-x: auto; /* เลื่อนซ้ายขวาได้ในมือถือ */
            -webkit-overflow-scrolling: touch;
        }

        table { width: 100%; border-collapse: collapse; min-width: 450px; }
        th { color: var(--text-dim); font-size: 0.65rem; padding: 12px 5px; border-bottom: 2px solid rgba(51, 65, 85, 0.5); }
        td { padding: 10px 5px; text-align: center; border-bottom: 1px solid rgba(51, 65, 85, 0.2); font-size: 0.85rem; }

        .team-cell { text-align: left !important; font-weight: bold; width: 30%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Match Cards Optimized for Mobile */
        .match-card { 
            background: var(--card-bg); 
            border-radius: 12px; 
            margin-bottom: 12px; 
            padding: 12px 8px; 
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            gap: 10px;
            align-items: center; 
            border: 1px solid rgba(51, 65, 85, 0.3);
        }

        .team-name-label {
            font-size: clamp(0.85rem, 3.5vw, 1rem);
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .score-section { display: flex; flex-direction: column; align-items: center; min-width: 90px; }
        .score-box { display: flex; justify-content: center; gap: 4px; align-items: center; }

        input[type="number"] { 
            width: 38px; height: 38px; background: #0f172a; border: 1px solid #334155; 
            border-radius: 8px; color: white; text-align: center; font-size: 1.1rem; font-weight: bold;
            -moz-appearance: textfield; 
        }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

        input:disabled { border-color: var(--primary); background: rgba(56, 189, 248, 0.1); color: var(--primary); }

        .btn-lock { 
            background: transparent; border: 1px solid var(--text-dim); color: var(--text-dim); 
            border-radius: 6px; padding: 3px 8px; font-size: 0.6rem; margin-top: 6px; 
            width: 100%; max-width: 80px;
        }
        .btn-lock.active { border-color: var(--win); color: var(--win); background: rgba(16, 185, 129, 0.1); }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .btn { 
            border: none; padding: 15px 10px; border-radius: 10px; cursor: pointer; 
            font-family: 'Kanit'; font-weight: bold; font-size: 0.9rem;
        }
        .btn-share { background: linear-gradient(135deg, var(--primary) 0%, #0ea5e9 100%); color: var(--bg-dark); }
        .btn-reset { background: #334155; color: var(--text-dim); }

        .pts-badge { background: var(--primary); color: var(--bg-dark); padding: 2px 6px; border-radius: 4px; font-weight: bold; }
        .form-dot { 
            display: inline-flex; align-items: center; justify-content: center;
            width: 16px; height: 16px; border-radius: 4px; margin: 0 1px; font-size: 0.55rem; color: var(--bg-dark);
        }
        .dot-w { background: var(--win); } .dot-d { background: var(--draw); } .dot-l { background: var(--loss); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div id="capture-area">
        <h2>🏆 BNCC LEAGUE</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 30px;">#</th>
                        <th style="text-align:left">TEAM</th>
                        <th>P</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>PTS</th>
                        <th>FORM</th>
                    </tr>
                </thead>
                <tbody id="standings-body"></tbody>
            </table>
        </div>
    </div>

    <div id="match-list"></div>

    <div class="btn-group">
        <button class="btn btn-share" onclick="shareAsImage()">📸 บันทึกรูป</button>
        <button class="btn btn-reset" onclick="resetScores()">ล้างข้อมูล</button>
    </div>
</div>

<script>
    const teamNames = ["ไอซ์", "ภู", "น็อต", "เจ๋ง", "อ้น"];
    let matches = [];
    let lockedMatches = {};

    function generateFixtures(teams) {
        let tempTeams = [...teams];
        if (tempTeams.length % 2 !== 0) tempTeams.push(null);
        let fixtureList = [];
        for (let r = 0; r < tempTeams.length - 1; r++) {
            for (let i = 0; i < tempTeams.length / 2; i++) {
                const home = tempTeams[i];
                const away = tempTeams[tempTeams.length - 1 - i];
                if (home && away) fixtureList.push({ home, away });
            }
            tempTeams.splice(1, 0, tempTeams.pop());
        }
        return fixtureList;
    }

    matches = generateFixtures(teamNames);

    function updateData() {
        let stats = teamNames.map(name => ({
            name, played: 0, win: 0, draw: 0, loss: 0, gf: 0, ga: 0, gd: 0, pts: 0, form: []
        }));
        let saveData = {};
        let h2hData = {};

        matches.forEach((match, i) => {
            const hInp = document.getElementById(`h-${i}`);
            const aInp = document.getElementById(`a-${i}`);
            if (hInp && aInp && hInp.value !== "" && aInp.value !== "") {
                const hs = parseInt(hInp.value); const as = parseInt(aInp.value);
                saveData[i] = { h: hs, a: as };
                const home = stats.find(t => t.name === match.home);
                const away = stats.find(t => t.name === match.away);
                
                home.played++; away.played++;
                home.gf += hs; home.ga += as;
                away.gf += as; away.ga += hs;

                const key = [match.home, match.away].sort().join('_vs_');
                h2hData[key] = { [match.home]: hs, [match.away]: as };

                if (hs > as) { home.win++; home.pts += 3; away.loss++; home.form.push('w'); away.form.push('l'); }
                else if (hs < as) { away.win++; away.pts += 3; home.loss++; away.form.push('w'); home.form.push('l'); }
                else { home.draw++; away.draw++; home.pts += 1; away.pts += 1; home.form.push('d'); away.form.push('d'); }
                home.gd = home.gf - home.ga; away.gd = away.gf - away.ga;
            }
        });

        localStorage.setItem('pes_scores_v4', JSON.stringify(saveData));
        localStorage.setItem('pes_locks_v4', JSON.stringify(lockedMatches));

        stats.sort((a, b) => {
            if (b.pts !== a.pts) return b.pts - a.pts;
            if (b.gd !== a.gd) return b.gd - a.gd;
            const key = [a.name, b.name].sort().join('_vs_');
            if (h2hData[key]) return h2hData[key][b.name] - h2hData[key][a.name];
            return 0;
        });

        renderStandings(stats);
        checkTournamentComplete(stats);
    }

    function toggleLock(i) {
        lockedMatches[i] = !lockedMatches[i];
        const hInp = document.getElementById(`h-${i}`);
        const aInp = document.getElementById(`a-${i}`);
        const btn = document.getElementById(`lock-btn-${i}`);
        
        if (lockedMatches[i]) {
            hInp.disabled = true; aInp.disabled = true;
            btn.innerText = "🔓 UNLOCK"; btn.classList.add('active');
            if (hInp.value !== aInp.value) confetti({ particleCount: 40, spread: 50, origin: { y: 0.7 } });
        } else {
            hInp.disabled = false; aInp.disabled = false;
            btn.innerText = "🔒 LOCK"; btn.classList.remove('active');
        }
        updateData();
    }

    function checkTournamentComplete(stats) {
        const completed = Object.keys(lockedMatches).filter(k => lockedMatches[k]).length;
        if (completed === matches.length && matches.length > 0) {
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
        }
    }

    function renderStandings(stats) {
        document.getElementById("standings-body").innerHTML = stats.map((team, i) => `
            <tr style="${i === 0 ? 'background: rgba(251, 191, 36, 0.08);' : ''}">
                <td>${i + 1}</td>
                <td class="team-cell" style="color:${i === 0 ? 'var(--gold)' : 'inherit'}">${team.name} ${i === 0 ? '🏆' : ''}</td>
                <td>${team.played}</td><td>${team.win}</td><td>${team.draw}</td><td>${team.loss}</td>
                <td style="color:${team.gd >= 0 ? 'var(--win)' : 'var(--loss)'}">${team.gd > 0 ? '+' + team.gd : team.gd}</td>
                <td><span class="pts-badge">${team.pts}</span></td>
                <td>${team.form.slice(-3).map(res => `<span class="form-dot dot-${res}">${res.toUpperCase()}</span>`).join('')}</td>
            </tr>
        `).join('');
    }

    function renderMatches() {
        document.getElementById("match-list").innerHTML = matches.map((match, i) => `
            <div class="match-card">
                <div class="team-name-label" style="text-align:right;">${match.home}</div>
                <div class="score-section">
                    <div class="score-box">
                        <input type="number" id="h-${i}" oninput="updateData()" placeholder="0">
                        <span style="font-weight:bold; color:var(--text-dim)">:</span>
                        <input type="number" id="a-${i}" oninput="updateData()" placeholder="0">
                    </div>
                    <button id="lock-btn-${i}" class="btn-lock" onclick="toggleLock(${i})">🔒 LOCK</button>
                </div>
                <div class="team-name-label" style="text-align:left;">${match.away}</div>
            </div>
        `).join('');
    }

    function shareAsImage() {
        html2canvas(document.getElementById("capture-area"), { 
            backgroundColor: "#0b1120",
            scale: 2 // ภาพชัดขึ้น
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'BNCC-Score.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }

    function resetScores() {
        if (confirm("ล้างข้อมูลทั้งหมด?")) { localStorage.clear(); location.reload(); }
    }

    renderMatches();
    const sScores = localStorage.getItem('pes_scores_v4');
    const sLocks = localStorage.getItem('pes_locks_v4');
    if (sScores) {
        const scores = JSON.parse(sScores);
        lockedMatches = sLocks ? JSON.parse(sLocks) : {};
        matches.forEach((_, i) => {
            if (scores[i]) {
                document.getElementById(`h-${i}`).value = scores[i].h;
                document.getElementById(`a-${i}`).value = scores[i].a;
                if (lockedMatches[i]) {
                    document.getElementById(`h-${i}`).disabled = true;
                    document.getElementById(`a-${i}`).disabled = true;
                    const btn = document.getElementById(`lock-btn-${i}`);
                    btn.innerText = "🔓 UNLOCK"; btn.classList.add('active');
                }
            }
        });
    }
    updateData();
</script>
</body>
</html>
